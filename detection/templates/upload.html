{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deepfake Detection - Insight Hackathon</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <style>
        body {
            background: #121212;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 95%;
            max-width: 900px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.6);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
            color: #00adb5;
        }

        /* Deepfake image */
        .deepfake-image {
            width: 100%;
            max-width: 600px; /* keeps it proportional */
            height: auto;
            margin-bottom: 25px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #00adb5;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .team-info {
            margin-bottom: 25px;
            padding: 20px;
            background: #2c2c2c;
            border-radius: 10px;
        }

        .team-info h3 {
            color: #00adb5;
            margin-bottom: 10px;
        }

        .upload-form input[type="file"] {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #555;
            width: 100%;
            margin-bottom: 20px;
            cursor: pointer;
            background: #333;
            color: #fff;
        }

        .upload-form button {
            background: #00adb5;
            color: #fff;
            border: none;
            padding: 14px 30px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-form button:hover {
            background: #00ced1;
        }

        .progress-container {
            width: 100%;
            background: #333;
            border-radius: 25px;
            overflow: hidden;
            margin-top: 15px;
            height: 20px;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #00adb5;
            text-align: center;
            color: #000;
            font-weight: bold;
            line-height: 20px;
            transition: width 0.2s;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #2c2c2c;
            border-radius: 10px;
        }

        .result span.real {
            color: #27ae60;
            font-weight: bold;
        }

        .result span.fake {
            color: #e74c3c;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .deepfake-image {
                max-width: 100%;
            }
        }

        @media (max-width: 500px) {
            .container {
                padding: 25px;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Deepfake image -->
        <img src="{% static 'deepfake_sample.jpg' %}" alt="Deepfake Image" class="deepfake-image">

        <h1>Deepfake Detection</h1>

        <div class="team-info">
            <h3>Insight Hackathon</h3>
            <p><strong>Group Name:</strong> CTRL C CTRL V</p>
            <p><strong>Members:</strong> Debanshu Dolui, Nourin Khan, Archishman Das, Arkapriya Nandi</p>
        </div>

        <form id="uploadForm" method="post" enctype="multipart/form-data" class="upload-form">
            {% csrf_token %}
            <input type="file" name="video" accept="video/*" required>
            <button type="submit">Upload & Detect</button>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
        </form>

        {% if result %}
        <div class="result">
            <h2>Prediction: <span class="{{ result|lower }}">{{ result }}</span></h2>
        </div>
        {% endif %}
    </div>

    <script src="{% static 'upload.js' %}"></script>
</body>
</html>
